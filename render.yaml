# Render Blueprint — Infrastructure as Code for ClutterGuard Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: clutterguard-api
    env: python
    region: singapore  # closest to India
    plan: free
    pythonVersion: 3.12.9
    buildCommand: pip install -r server/requirements.txt
    startCommand: python run.py
    healthCheckPath: /
    envVars:
      - key: MONGODB_URI
        sync: false  # Set this manually in Render Dashboard
      - key: MONGODB_DB
        value: clutterguard
      - key: JWT_SECRET
        generateValue: true  # Auto-generates a secure random secret
      - key: JWT_EXPIRE_DAYS
        value: "30"
      - key: ALLOWED_ORIGINS
        value: https://frontend-63lz2r4b3-ananyabarai092-webs-projects.vercel.app,http://localhost:5173