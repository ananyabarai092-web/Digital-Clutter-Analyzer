# Render Blueprint — Infrastructure as Code for ClutterGuard Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: clutterguard-api
    env: python
    region: singapore  # closest to India
    plan: free
    buildCommand: pip install -r server/requirements.txt
    startCommand: python -c "import sys; from pathlib import Path; sys.path.insert(0, str(Path('.').resolve())); from server.main import app; import uvicorn; uvicorn.run(app, host='0.0.0.0', port=${PORT:-8000})"
    healthCheckPath: /
    envVars:
      - key: MONGODB_URI
        sync: false  # Set this manually in Render Dashboard
      - key: MONGODB_DB
        value: clutterguard
      - key: JWT_SECRET
        generateValue: true  # Auto-generates a secure random secret
      - key: JWT_EXPIRE_DAYS
        value: "30"
      - key: ALLOWED_ORIGINS
        value: https://frontend-kohl-ten-86.vercel.app,http://localhost:5173
